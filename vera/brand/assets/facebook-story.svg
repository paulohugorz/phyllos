<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">

  <!-- Background dark -->
  <rect width="1080" height="1920" fill="#2C2C2C"/>

  <!-- Sage large circle top right -->
  <circle cx="950" cy="300" r="400" fill="#9CA88F" opacity="0.10"/>
  <!-- Terracota mid circle -->
  <circle cx="150" cy="1100" r="280" fill="#C4856A" opacity="0.08"/>
  <!-- Sage accent bottom -->
  <circle cx="900" cy="1700" r="220" fill="#9CA88F" opacity="0.07"/>

  <!-- Botanical top decoration -->
  <line x1="200" y1="180" x2="200" y2="560" stroke="#9CA88F" stroke-width="1.5" opacity="0.5"/>
  <line x1="228" y1="220" x2="228" y2="500" stroke="#9CA88F" stroke-width="1" opacity="0.35"/>
  <ellipse cx="200" cy="280" rx="44" ry="17" fill="none" stroke="#9CA88F" stroke-width="1.2" opacity="0.5" transform="rotate(-35 200 280)"/>
  <ellipse cx="200" cy="380" rx="44" ry="17" fill="none" stroke="#9CA88F" stroke-width="1.2" opacity="0.5" transform="rotate(28 200 380)"/>
  <ellipse cx="200" cy="460" rx="36" ry="14" fill="none" stroke="#9CA88F" stroke-width="1" opacity="0.4" transform="rotate(-15 200 460)"/>
  <ellipse cx="228" cy="330" rx="34" ry="13" fill="none" stroke="#9CA88F" stroke-width="0.9" opacity="0.35" transform="rotate(20 228 330)"/>

  <!-- Top label -->
  <text x="540" y="200" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="7" fill="#9CA88F" text-anchor="middle" opacity="0.8">MARCA DE BELEZA · BRASIL</text>

  <!-- VERA large wordmark -->
  <text x="540" y="700" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="300" letter-spacing="28" fill="#F5F2ED" text-anchor="middle">VERA</text>

  <!-- Thin divider -->
  <rect x="420" y="730" width="240" height="2" fill="#C4856A"/>

  <!-- Main quote -->
  <text x="540" y="900" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="300" font-style="italic" fill="#F5F2ED" text-anchor="middle">"Cuidar é um ato</text>
  <text x="540" y="956" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="300" font-style="italic" fill="#F5F2ED" text-anchor="middle">de inteligência."</text>

  <!-- Botanical bottom decoration -->
  <line x1="880" y1="1360" x2="880" y2="1740" stroke="#9CA88F" stroke-width="1.5" opacity="0.45"/>
  <line x1="852" y1="1400" x2="852" y2="1680" stroke="#9CA88F" stroke-width="1" opacity="0.3"/>
  <ellipse cx="880" cy="1440" rx="44" ry="17" fill="none" stroke="#9CA88F" stroke-width="1.2" opacity="0.45" transform="rotate(32 880 1440)"/>
  <ellipse cx="880" cy="1540" rx="44" ry="17" fill="none" stroke="#9CA88F" stroke-width="1.2" opacity="0.45" transform="rotate(-28 880 1540)"/>
  <ellipse cx="880" cy="1630" rx="36" ry="14" fill="none" stroke="#9CA88F" stroke-width="1" opacity="0.35" transform="rotate(18 880 1630)"/>
  <ellipse cx="852" cy="1490" rx="34" ry="13" fill="none" stroke="#9CA88F" stroke-width="0.9" opacity="0.3" transform="rotate(-22 852 1490)"/>

  <!-- Sub tagline -->
  <text x="540" y="1200" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="8" fill="#9CA88F" text-anchor="middle">BELEZA INTELIGENTE</text>

  <!-- Sage accent line -->
  <rect x="380" y="1230" width="320" height="1" fill="#9CA88F" opacity="0.4"/>

  <!-- Product teaser -->
  <text x="540" y="1310" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="300" font-style="italic" fill="#EDE9E1" text-anchor="middle" opacity="0.7">Sérum Vitamina C 15% — disponível agora</text>

  <!-- Bottom CTA -->
  <rect x="0" y="1780" width="1080" height="140" fill="#9CA88F" opacity="0.15"/>
  <text x="540" y="1842" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="5" fill="#F5F2ED" text-anchor="middle">CONHEÇA A FÓRMULA</text>
  <text x="540" y="1876" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#9CA88F" text-anchor="middle">vera.com.br</text>

</svg>
