<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">

  <!-- Background circle (para foto de perfil circular do Facebook) -->
  <rect width="500" height="500" fill="#2C2C2C"/>

  <!-- Inner circle off-white (área visível no recorte circular) -->
  <circle cx="250" cy="250" r="250" fill="#2C2C2C"/>

  <!-- Sage accent circle top right -->
  <circle cx="390" cy="120" r="80" fill="#9CA88F" opacity="0.15"/>
  <!-- Terracota accent bottom left -->
  <circle cx="110" cy="380" r="60" fill="#C4856A" opacity="0.12"/>

  <!-- Brand name VERA centered -->
  <text
    x="250"
    y="278"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-weight="300"
    letter-spacing="18"
    fill="#F5F2ED"
    text-anchor="middle"
  >VERA</text>

  <!-- Thin divider line below -->
  <rect x="190" y="296" width="120" height="1.5" fill="#9CA88F"/>

  <!-- Sub label -->
  <text
    x="250"
    y="324"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="5"
    fill="#9CA88F"
    text-anchor="middle"
    opacity="0.9"
  >BELEZA</text>

</svg>
