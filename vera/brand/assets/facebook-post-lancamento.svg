<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">

  <!-- Background -->
  <rect width="1080" height="1080" fill="#F5F2ED"/>

  <!-- Large sage circle — background mood -->
  <circle cx="900" cy="200" r="320" fill="#9CA88F" opacity="0.13"/>
  <!-- Terracota accent bottom left -->
  <circle cx="140" cy="920" r="180" fill="#C4856A" opacity="0.10"/>
  <!-- Small sage detail -->
  <circle cx="180" cy="200" r="100" fill="#9CA88F" opacity="0.09"/>

  <!-- Top botanical line detail -->
  <line x1="100" y1="80" x2="100" y2="340" stroke="#9CA88F" stroke-width="1" opacity="0.6"/>
  <line x1="120" y1="110" x2="120" y2="300" stroke="#9CA88F" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="100" cy="150" rx="32" ry="13" fill="none" stroke="#9CA88F" stroke-width="1" opacity="0.55" transform="rotate(-35 100 150)"/>
  <ellipse cx="100" cy="220" rx="32" ry="13" fill="none" stroke="#9CA88F" stroke-width="1" opacity="0.55" transform="rotate(30 100 220)"/>
  <ellipse cx="120" cy="185" rx="26" ry="10" fill="none" stroke="#9CA88F" stroke-width="0.8" opacity="0.4" transform="rotate(-20 120 185)"/>

  <!-- Lançamento badge -->
  <rect x="540" y="140" width="220" height="38" rx="4" fill="#C4856A"/>
  <text x="650" y="165" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="500" letter-spacing="5" fill="#F5F2ED" text-anchor="middle">LANÇAMENTO</text>

  <!-- Novo -->
  <text x="540" y="270" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" letter-spacing="6" fill="#9CA88F">SKINCARE FACIAL · NOVA FÓRMULA</text>

  <!-- Product name large -->
  <text x="540" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="300" fill="#2C2C2C">Sérum</text>
  <text x="540" y="445" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="300" fill="#2C2C2C">Vitamina C</text>

  <!-- Concentration highlight -->
  <text x="540" y="528" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#C4856A">15%</text>

  <!-- Plus niacinamida -->
  <text x="540" y="590" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="300" fill="#4a4a4a">+ Niacinamida 5%</text>

  <!-- Divider -->
  <rect x="540" y="620" width="64" height="2" fill="#9CA88F"/>

  <!-- Volume + type -->
  <text x="540" y="660" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#6b6b6b">30ml · Sérum aquoso · Frasco âmbar</text>

  <!-- Benefits list -->
  <text x="540" y="720" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4a4a4a">✦  Uniformiza manchas e textura</text>
  <text x="540" y="748" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4a4a4a">✦  Estimula colágeno com dose clínica</text>
  <text x="540" y="776" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4a4a4a">✦  INCI transparente · Sem fragrância</text>

  <!-- Bottom divider -->
  <rect x="0" y="870" width="1080" height="1" fill="#EDE9E1"/>

  <!-- Footer bar -->
  <rect x="0" y="870" width="1080" height="210" fill="#2C2C2C"/>

  <!-- VERA wordmark footer -->
  <text x="100" y="960" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="300" letter-spacing="14" fill="#F5F2ED">VERA</text>

  <!-- Tagline footer -->
  <text x="100" y="998" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="300" font-style="italic" fill="#9CA88F">Ciência aplicada à pele que você vê todos os dias.</text>

  <!-- Right CTA -->
  <text x="980" y="948" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="#F5F2ED" text-anchor="end">VER PRODUTO</text>
  <rect x="840" y="958" width="140" height="1" fill="#C4856A"/>
  <text x="980" y="980" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#9CA88F" text-anchor="end">vera.com.br</text>

</svg>
