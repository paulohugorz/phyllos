<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHYLLOS — Ateliê</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --obsidian:  #0F0F0D;
      --cream:     #F5F2EB;
      --gold:      #B89A6A;
      --muted:     #9E9B95;
      --border:    rgba(15,15,13,0.12);
      --border-md: rgba(15,15,13,0.22);
      --green:     #4A7C59;
      --red:       #8B3A3A;
    }

    html, body { height: 100%; }

    body {
      background: var(--cream);
      color: var(--obsidian);
      font-family: 'Jost', system-ui, sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--cream);
      z-index: 100;
    }
    .header-left { display: flex; align-items: baseline; gap: 10px; }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 3px;
      font-size: 13px;
      letter-spacing: 0.03em;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: var(--obsidian); color: var(--cream); }
    #toast.err { background: var(--red); color: #fff; }

    /* ── Tela 1 — Lista ── */
    #screen-list { display: block; }
    #screen-detail { display: none; }

    .list-header {
      padding: 28px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .list-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 400;
    }

    .cards-grid {
      padding: 0 24px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .peca-card {
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      background: #fff;
    }
    .peca-card:hover {
      border-color: var(--border-md);
      box-shadow: 0 2px 12px rgba(15,15,13,0.06);
    }
    .card-code {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 400;
      margin-bottom: 10px;
    }
    .card-tecido {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Badges de status */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.06em;
      font-weight: 400;
    }
    .badge-ideia        { background: rgba(158,155,149,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-desenvolvimento { background: rgba(184,154,106,0.15); color: #8a6e3a; border: 1px solid rgba(184,154,106,0.3); }
    .badge-finalizado   { background: rgba(74,124,89,0.12); color: var(--green); border: 1px solid rgba(74,124,89,0.25); }
    .badge-produzindo   { background: rgba(74,124,89,0.08); color: #3a6b4a; border: 1px solid rgba(74,124,89,0.2); }
    .badge-entregue     { background: rgba(15,15,13,0.07); color: var(--obsidian); border: 1px solid var(--border-md); }

    .empty-list {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Tela 2 — Detalhe ── */
    .detail-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-back:hover { color: var(--obsidian); }
    .detail-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 20px;
      font-weight: 400;
      flex: 1;
    }
    .detail-code {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Seções */
    .detail-body {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 540px) { .field-row { grid-template-columns: 1fr; } }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-md);
      border-radius: 2px;
      padding: 10px 12px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--obsidian);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--gold); }
    .field input[readonly] {
      background: rgba(158,155,149,0.08);
      color: var(--muted);
      cursor: default;
    }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
    .field select { cursor: pointer; }

    /* Fibras */
    .fibras-list, .certs-list, .etapas-list { display: flex; flex-direction: column; gap: 10px; }

    .fibra-row, .cert-row, .etapa-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .fibra-row .field-pct { width: 80px; flex-shrink: 0; }
    .fibra-row .field-mat { flex: 1; }

    .cert-row .field-nome { flex: 2; }
    .cert-row .field-num  { flex: 1.2; }
    .cert-row .field-val  { flex: 1; }

    .etapa-row .field-etapa { flex: 1.5; }
    .etapa-row .field-pais  { flex: 1; }
    .etapa-row .field-inst  { flex: 1.5; }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      padding: 8px 4px 0;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--red); }

    .pct-total {
      font-size: 12px;
      margin-top: 6px;
    }
    .pct-total.ok  { color: var(--green); }
    .pct-total.err { color: var(--red); }

    /* Botões */
    .btn {
      padding: 11px 22px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--obsidian);
      color: var(--cream);
      border: 1px solid var(--obsidian);
    }
    .btn-primary:hover { background: #2a2a26; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-outline {
      background: transparent;
      color: var(--obsidian);
      border: 1px solid var(--border-md);
    }
    .btn-outline:hover { border-color: var(--obsidian); }
    .btn-gold {
      background: var(--gold);
      color: #fff;
      border: 1px solid var(--gold);
    }
    .btn-gold:hover { background: #a6895a; }
    .btn-gold:disabled { opacity: 0.4; cursor: default; }
    .btn-add {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.06em;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.7; }

    .section-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* DPP */
    .dpp-section { display: none; }
    .dpp-section.visible { display: block; }

    .dpp-published {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .dpp-published.visible { display: flex; }
    .badge-published {
      background: rgba(74,124,89,0.12);
      color: var(--green);
      border: 1px solid rgba(74,124,89,0.25);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    #dpp-qr img {
      width: 160px;
      height: 160px;
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-top: 12px;
    }
    .dpp-link {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      word-break: break-all;
    }
    .dpp-link a { color: var(--gold); }

    .tooltip {
      display: inline-block;
      position: relative;
      cursor: help;
      margin-left: 4px;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border-md);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      text-align: center;
      line-height: 14px;
    }
    .tooltip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--obsidian);
      color: var(--cream);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 2px;
      width: 200px;
      white-space: normal;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .tooltip:hover::after { opacity: 1; }

    /* Loading spinner inline */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::selection { background: rgba(184,154,106,0.15); }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .fibra-row, .cert-row, .etapa-row { flex-wrap: wrap; }
      .fibra-row .field-pct { width: 100%; }
      .cert-row .field-nome,
      .cert-row .field-num,
      .cert-row .field-val  { flex: 1 1 100%; }
      .etapa-row .field-etapa,
      .etapa-row .field-pais,
      .etapa-row .field-inst { flex: 1 1 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <span class="logo">PHYLLOS</span>
      <span class="logo-sub">Ateliê</span>
    </div>
  </header>

  <div id="toast"></div>

  <!-- ═══════════════════════════════════════ TELA 1 — LISTA ═════════════════════════════════════ -->
  <div id="screen-list">
    <div class="list-header">
      <h1 class="list-title">Peças cadastradas</h1>
      <button class="btn btn-primary" onclick="App.abrirNovaPeca()">+ Nova Peça</button>
    </div>
    <div class="cards-grid" id="cards-grid">
      <div class="empty-list">Carregando peças...</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ TELA 2 — DETALHE ══════════════════════════════════ -->
  <div id="screen-detail">
    <div class="detail-header">
      <button class="btn-back" onclick="App.voltarLista()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar
      </button>
      <div style="flex:1">
        <div class="detail-code" id="d-code"></div>
        <div class="detail-title" id="d-title">Nova Peça</div>
      </div>
      <div id="d-badge"></div>
    </div>

    <div class="detail-body">

      <!-- ── Seção 1: Informações básicas ── -->
      <section>
        <div class="section-title">Informações básicas</div>
        <div class="field-group">
          <div class="field-row">
            <div class="field">
              <label>Nome da peça</label>
              <input type="text" id="f-nome" placeholder="ex: Calça Wide Leg Alfaiataria" />
            </div>
            <div class="field">
              <label>Código</label>
              <input type="text" id="f-codigo" placeholder="ex: PH-CAL-001" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Tecido principal</label>
              <input type="text" id="f-tecido" placeholder="ex: Malha ribana 95% algodão 5% elastano" />
            </div>
            <div class="field">
              <label>Situação</label>
              <select id="f-status">
                <option value="ideia">Em ideia</option>
                <option value="desenvolvimento">Em desenvolvimento</option>
                <option value="finalizado">Finalizada</option>
                <option value="produzindo">Produzindo</option>
                <option value="entregue">Entregue</option>
              </select>
            </div>
          </div>
        </div>
        <div class="section-actions">
          <button class="btn btn-primary" onclick="App.salvarBasico()">Salvar informações</button>
        </div>
      </section>

      <!-- ── Seção 2: Matéria-prima ── -->
      <section>
        <div class="section-title">Matéria-prima</div>
        <div class="field-group">

          <!-- Composição de fibras -->
          <div class="field">
            <label>De que é feita essa peça?</label>
            <div class="fibras-list" id="fibras-list"></div>
            <button class="btn-add" onclick="App.addFibra()">+ Adicionar material</button>
            <div class="pct-total" id="pct-total"></div>
          </div>

          <!-- Certificados -->
          <div class="field">
            <label>Tem algum certificado de qualidade?</label>
            <div class="certs-list" id="certs-list"></div>
            <button class="btn-add" onclick="App.addCert()">+ Adicionar certificado</button>
          </div>

          <!-- Reciclado -->
          <div class="field" style="max-width:240px">
            <label>Tem material reciclado? Qual porcentagem?</label>
            <input type="number" id="f-reciclado" min="0" max="100" placeholder="0" />
          </div>

          <!-- Cuidados -->
          <div class="field">
            <label>Como lavar e cuidar?</label>
            <textarea id="f-cuidados" placeholder="ex: Lavar à mão em água fria. Não usar alvejante. Secar à sombra..."></textarea>
          </div>

          <!-- Reparo -->
          <div class="field">
            <label>Como consertar se tiver algum problema?</label>
            <textarea id="f-reparo" placeholder="ex: Costuras podem ser refeitas em ateliê especializado. Tecido aceita remendo invisível..."></textarea>
          </div>

          <!-- Fim de vida -->
          <div class="field">
            <label>O que fazer com a peça quando não usar mais?</label>
            <textarea id="f-fimvida" placeholder="ex: Pode ser reciclada em pontos de coleta têxtil, doada ou compostada se for 100% natural..."></textarea>
          </div>

        </div>
        <div class="section-actions">
          <button class="btn btn-primary" onclick="App.salvarFicha()">Salvar matéria-prima</button>
        </div>
      </section>

      <!-- ── Seção 3: Cadeia produtiva ── -->
      <section>
        <div class="section-title">Onde cada parte foi feita?</div>
        <div class="etapas-list" id="etapas-list">
          <div style="color:var(--muted);font-size:13px">Nenhuma etapa registrada ainda.</div>
        </div>
        <div class="section-actions">
          <button class="btn btn-outline" onclick="App.addEtapa()">+ Registrar etapa</button>
        </div>
        <div id="etapa-form" style="display:none;margin-top:20px">
          <div class="etapa-row">
            <div class="field field-etapa">
              <label>O que foi feito?</label>
              <select id="nef-etapa">
                <option value="fiacao">Fiação de fio</option>
                <option value="tecelagem">Tecelagem / Malharia</option>
                <option value="corte">Corte</option>
                <option value="costura">Costura</option>
                <option value="tingimento">Tingimento</option>
                <option value="acabamento">Acabamento</option>
                <option value="lavanderia">Lavanderia</option>
              </select>
            </div>
            <div class="field field-pais">
              <label>Em qual país?</label>
              <input type="text" id="nef-pais" placeholder="ex: Brasil" />
            </div>
            <div class="field field-inst">
              <label>Nome do fornecedor / fábrica <span style="color:var(--muted)">(opcional)</span></label>
              <input type="text" id="nef-inst" placeholder="ex: Têxtil São Paulo" />
            </div>
          </div>
          <div class="section-actions">
            <button class="btn btn-primary" onclick="App.salvarEtapa()">Salvar etapa</button>
            <button class="btn btn-outline" onclick="App.cancelarEtapa()">Cancelar</button>
          </div>
        </div>
      </section>

      <!-- ── Seção 4: DPP ── -->
      <section class="dpp-section" id="dpp-section">
        <div class="section-title">Passaporte Digital do Produto (DPP)</div>
        <div class="dpp-published" id="dpp-published">
          <span class="badge-published">Publicado</span>
          <span style="font-size:12px;color:var(--muted)">O passaporte já está disponível publicamente.</span>
        </div>
        <div id="dpp-qr"></div>
        <div id="dpp-link-wrap" class="dpp-link"></div>
        <div class="field-group" style="margin-top:20px">
          <div class="field" style="max-width:320px">
            <label>
              Código de barras (GTIN)
              <span class="tooltip" data-tip="Código de 13 dígitos do produto, encontrado no código de barras da etiqueta.">?</span>
            </label>
            <input type="text" id="f-gtin" placeholder="ex: 7891234567890" maxlength="14" />
          </div>
        </div>
        <div class="section-actions">
          <button class="btn btn-gold" id="btn-publicar-dpp" onclick="App.publicarDPP()">Publicar Passaporte Digital</button>
        </div>
      </section>

    </div>
  </div>

  <script>
  'use strict';

  /* ═══════════════════════════════════════════════════════════════
     UTILITÁRIOS
  ═══════════════════════════════════════════════════════════════ */

  let _toastTimer = null;
  function toast(msg, tipo = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + tipo;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  function badgeClass(status) {
    const map = {
      ideia: 'badge-ideia',
      desenvolvimento: 'badge-desenvolvimento',
      finalizado: 'badge-finalizado',
      produzindo: 'badge-produzindo',
      entregue: 'badge-entregue',
    };
    return map[status] || 'badge-ideia';
  }

  function badgeLabel(status) {
    const map = {
      ideia: 'Em ideia',
      desenvolvimento: 'Em desenvolvimento',
      finalizado: 'Finalizada',
      produzindo: 'Produzindo',
      entregue: 'Entregue',
    };
    return map[status] || status || 'Em ideia';
  }

  function setLoading(btn, loading) {
    if (loading) {
      btn._origText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>Salvando…';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn._origText || 'Salvar';
      btn.disabled = false;
    }
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    let data;
    try { data = await res.json(); } catch(_) { data = {}; }
    if (!res.ok) throw new Error(data.detail || data.message || `Erro ${res.status}`);
    return data;
  }

  /* ═══════════════════════════════════════════════════════════════
     ESTADO GLOBAL
  ═══════════════════════════════════════════════════════════════ */

  const State = {
    pecas: [],
    pecaAtual: null,   // objeto peça
    fichaId: null,     // id da ficha técnica
    fichaExiste: false,
    etapas: [],
    dppPublicado: false,
  };

  /* ═══════════════════════════════════════════════════════════════
     APP
  ═══════════════════════════════════════════════════════════════ */

  const App = {

    /* ─── LISTA ─── */

    async carregarLista() {
      try {
        const pecas = await api('GET', '/pecas');
        State.pecas = pecas;
        App.renderLista();
      } catch(e) {
        document.getElementById('cards-grid').innerHTML =
          `<div class="empty-list">Não foi possível carregar as peças. Verifique se a API está rodando.</div>`;
      }
    },

    renderLista() {
      const grid = document.getElementById('cards-grid');
      if (!State.pecas.length) {
        grid.innerHTML = '<div class="empty-list">Nenhuma peça cadastrada ainda. Crie a primeira!</div>';
        return;
      }
      grid.innerHTML = State.pecas.map(p => `
        <div class="peca-card" onclick="App.abrirPeca(${JSON.stringify(p.codigo).replace(/"/g,'&quot;')})">
          <div class="card-code">${p.codigo || ''}</div>
          <div class="card-name">${p.nome || '—'}</div>
          <div class="card-tecido">${p.tecido || 'Tecido não informado'}</div>
          <span class="badge ${badgeClass(p.status)}">${badgeLabel(p.status)}</span>
        </div>
      `).join('');
    },

    abrirNovaPeca() {
      State.pecaAtual = null;
      State.fichaId = null;
      State.fichaExiste = false;
      State.etapas = [];
      State.dppPublicado = false;
      App.limparFormulario();
      App.mostrarTela('detail');
    },

    voltarLista() {
      App.mostrarTela('list');
      App.carregarLista();
    },

    mostrarTela(tela) {
      document.getElementById('screen-list').style.display   = tela === 'list'   ? 'block' : 'none';
      document.getElementById('screen-detail').style.display = tela === 'detail' ? 'block' : 'none';
    },

    /* ─── ABRIR PEÇA EXISTENTE ─── */

    async abrirPeca(codigo) {
      try {
        // Carrega peça
        const pecas = await api('GET', '/pecas');
        const peca = pecas.find(p => p.codigo === codigo);
        if (!peca) { toast('Peça não encontrada.', 'err'); return; }
        State.pecaAtual = peca;

        App.preencherBasico(peca);
        App.mostrarTela('detail');

        // Carrega ficha
        await App.carregarFicha(peca.id);

        // Carrega etapas
        await App.carregarEtapas(peca.codigo);

        // DPP
        App.atualizarDPPSection();
      } catch(e) {
        toast('Erro ao abrir peça: ' + e.message, 'err');
      }
    },

    preencherBasico(peca) {
      document.getElementById('d-code').textContent  = peca.codigo || '';
      document.getElementById('d-title').textContent = peca.nome   || 'Nova Peça';
      document.getElementById('d-badge').innerHTML   =
        `<span class="badge ${badgeClass(peca.status)}">${badgeLabel(peca.status)}</span>`;
      document.getElementById('f-nome').value   = peca.nome   || '';
      document.getElementById('f-codigo').value = peca.codigo || '';
      document.getElementById('f-tecido').value = peca.tecido || '';
      document.getElementById('f-status').value = peca.status || 'ideia';
      // Código é read-only se já existe
      document.getElementById('f-codigo').readOnly = !!peca.codigo;
    },

    limparFormulario() {
      document.getElementById('d-code').textContent  = '';
      document.getElementById('d-title').textContent = 'Nova Peça';
      document.getElementById('d-badge').innerHTML   = '';
      ['f-nome','f-codigo','f-tecido','f-gtin'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.value = ''; el.readOnly = false; }
      });
      document.getElementById('f-status').value = 'ideia';
      document.getElementById('f-reciclado').value = '';
      document.getElementById('f-cuidados').value = '';
      document.getElementById('f-reparo').value = '';
      document.getElementById('f-fimvida').value = '';
      document.getElementById('fibras-list').innerHTML = '';
      document.getElementById('certs-list').innerHTML  = '';
      document.getElementById('pct-total').textContent = '';
      document.getElementById('etapas-list').innerHTML =
        '<div style="color:var(--muted);font-size:13px">Nenhuma etapa registrada ainda.</div>';
      document.getElementById('etapa-form').style.display = 'none';
      document.getElementById('dpp-section').classList.remove('visible');
      document.getElementById('dpp-published').classList.remove('visible');
      document.getElementById('dpp-qr').innerHTML = '';
      document.getElementById('dpp-link-wrap').innerHTML = '';
    },

    /* ─── BÁSICO ─── */

    async salvarBasico() {
      const btn  = document.querySelector('[onclick="App.salvarBasico()"]');
      const nome = document.getElementById('f-nome').value.trim();
      const cod  = document.getElementById('f-codigo').value.trim();

      if (!nome) { toast('Informe o nome da peça.', 'err'); return; }
      if (!cod)  { toast('Informe o código da peça.', 'err'); return; }

      setLoading(btn, true);
      try {
        if (State.pecaAtual) {
          // Atualizar
          const updated = await api('PATCH', `/pecas/${cod}`, {
            nome,
            tecido: document.getElementById('f-tecido').value.trim() || null,
            status: document.getElementById('f-status').value,
          });
          State.pecaAtual = updated;
          App.preencherBasico(updated);
          toast('Informações salvas.');
          App.atualizarDPPSection();
        } else {
          // Criar nova
          const colecaoId = null;
          const nova = await api('POST', '/pecas', {
            codigo: cod,
            nome,
            tecido: document.getElementById('f-tecido').value.trim() || null,
            status: document.getElementById('f-status').value,
            colecao_id: colecaoId,
          });
          State.pecaAtual = nova;
          document.getElementById('f-codigo').readOnly = true;
          App.preencherBasico(nova);
          toast('Peça criada com sucesso!');
          App.atualizarDPPSection();
        }
      } catch(e) {
        toast('Erro ao salvar: ' + e.message, 'err');
      }
      setLoading(btn, false);
    },

    /* ─── FICHA TÉCNICA ─── */

    async carregarFicha(pecaId) {
      try {
        const ficha = await api('GET', `/fichas-tecnicas/${pecaId}`);
        State.fichaId     = ficha.id;
        State.fichaExiste = true;
        App.preencherFicha(ficha);
      } catch(e) {
        // 404 = ficha ainda não existe
        State.fichaId     = null;
        State.fichaExiste = false;
      }
    },

    preencherFicha(ficha) {
      document.getElementById('f-reciclado').value = ficha.conteudo_reciclado_pct ?? '';
      document.getElementById('f-cuidados').value  = ficha.materiais              || '';
      document.getElementById('f-reparo').value    = ficha.instrucoes_reparo      || '';
      document.getElementById('f-fimvida').value   = ficha.instrucoes_fim_de_vida || '';

      // Fibras
      let fibras = [];
      try { fibras = JSON.parse(ficha.composicao_fibras || '[]'); } catch(_) {}
      document.getElementById('fibras-list').innerHTML = '';
      fibras.forEach(f => App.addFibra(f.fibra, f.pct));
      App.atualizarTotalPct();

      // Certificados
      let certs = [];
      try { certs = JSON.parse(ficha.certificacoes || '[]'); } catch(_) {}
      document.getElementById('certs-list').innerHTML = '';
      certs.forEach(c => App.addCert(c.nome, c.numero, c.validade));
    },

    async salvarFicha() {
      if (!State.pecaAtual) { toast('Salve as informações básicas primeiro.', 'err'); return; }
      const btn = document.querySelector('[onclick="App.salvarFicha()"]');
      setLoading(btn, true);

      try {
        const fibras = App.coletarFibras();
        const certs  = App.coletarCerts();
        const total  = fibras.reduce((s, f) => s + Number(f.pct || 0), 0);

        if (fibras.length && total !== 100) {
          toast('A soma dos materiais deve ser 100%. Corrija antes de salvar.', 'err');
          setLoading(btn, false);
          return;
        }

        const payload = {
          peca_id:                   State.pecaAtual.id,
          materiais:                 document.getElementById('f-cuidados').value.trim() || null,
          instrucoes_reparo:         document.getElementById('f-reparo').value.trim()   || null,
          instrucoes_fim_de_vida:    document.getElementById('f-fimvida').value.trim()  || null,
          composicao_fibras:         fibras.length ? JSON.stringify(fibras) : null,
          certificacoes:             certs.length  ? JSON.stringify(certs)  : null,
          conteudo_reciclado_pct:    document.getElementById('f-reciclado').value !== ''
                                       ? Number(document.getElementById('f-reciclado').value)
                                       : null,
        };

        if (State.fichaExiste) {
          await api('PATCH', `/fichas-tecnicas/${State.pecaAtual.id}`, payload);
        } else {
          const criada = await api('POST', '/fichas-tecnicas', payload);
          State.fichaId     = criada.id;
          State.fichaExiste = true;
        }
        toast('Matéria-prima salva.');
      } catch(e) {
        toast('Erro ao salvar: ' + e.message, 'err');
      }
      setLoading(btn, false);
    },

    /* ─── FIBRAS ─── */

    addFibra(material = '', pct = '') {
      const list = document.getElementById('fibras-list');
      const row  = document.createElement('div');
      row.className = 'fibra-row';
      row.innerHTML = `
        <div class="field field-mat">
          <input type="text" placeholder="ex: algodão orgânico" value="${material}" oninput="App.atualizarTotalPct()" />
        </div>
        <div class="field field-pct">
          <input type="number" placeholder="%" min="0" max="100" value="${pct}" oninput="App.atualizarTotalPct()" />
        </div>
        <button class="btn-remove" title="Remover" onclick="this.parentElement.remove();App.atualizarTotalPct()">&#215;</button>
      `;
      list.appendChild(row);
      App.atualizarTotalPct();
    },

    coletarFibras() {
      return [...document.getElementById('fibras-list').querySelectorAll('.fibra-row')].map(row => {
        const inputs = row.querySelectorAll('input');
        return { fibra: inputs[0].value.trim(), pct: Number(inputs[1].value) };
      }).filter(f => f.fibra);
    },

    atualizarTotalPct() {
      const total = App.coletarFibras().reduce((s, f) => s + Number(f.pct || 0), 0);
      const el    = document.getElementById('pct-total');
      if (!App.coletarFibras().length) { el.textContent = ''; return; }
      el.textContent = `Total: ${total}%`;
      el.className   = 'pct-total ' + (total === 100 ? 'ok' : 'err');
    },

    /* ─── CERTIFICADOS ─── */

    addCert(nome = '', numero = '', validade = '') {
      const list = document.getElementById('certs-list');
      const row  = document.createElement('div');
      row.className = 'cert-row';
      row.innerHTML = `
        <div class="field field-nome">
          <input type="text" placeholder="ex: OEKO-TEX, GOTS, GRS" value="${nome}" />
        </div>
        <div class="field field-num">
          <input type="text" placeholder="Número" value="${numero}" />
        </div>
        <div class="field field-val">
          <input type="text" placeholder="Válido até (mês/ano ex: 2027-06)" value="${validade}" />
        </div>
        <button class="btn-remove" title="Remover" onclick="this.parentElement.remove()">&#215;</button>
      `;
      list.appendChild(row);
    },

    coletarCerts() {
      return [...document.getElementById('certs-list').querySelectorAll('.cert-row')].map(row => {
        const inputs = row.querySelectorAll('input');
        return { nome: inputs[0].value.trim(), numero: inputs[1].value.trim(), validade: inputs[2].value.trim() };
      }).filter(c => c.nome);
    },

    /* ─── ETAPAS ─── */

    async carregarEtapas(codigo) {
      try {
        const etapas = await api('GET', `/pecas/${codigo}/etapas-producao`);
        State.etapas = etapas;
        App.renderEtapas();
      } catch(_) {
        State.etapas = [];
      }
    },

    renderEtapas() {
      const list = document.getElementById('etapas-list');
      if (!State.etapas.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:13px">Nenhuma etapa registrada ainda.</div>';
        return;
      }
      const labelMap = {
        fiacao: 'Fiação de fio',
        tecelagem: 'Tecelagem / Malharia',
        corte: 'Corte',
        costura: 'Costura',
        tingimento: 'Tingimento',
        acabamento: 'Acabamento',
        lavanderia: 'Lavanderia',
      };
      list.innerHTML = State.etapas.map(e => `
        <div style="border:1px solid var(--border);border-radius:2px;padding:12px 16px;margin-bottom:4px;background:#fff">
          <div style="font-size:13px;font-weight:400">${labelMap[e.etapa] || e.etapa}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">
            ${e.pais ? e.pais : ''}${e.pais && e.instalacao_nome ? ' — ' : ''}${e.instalacao_nome || ''}
          </div>
        </div>
      `).join('');
    },

    addEtapa() {
      document.getElementById('etapa-form').style.display = 'block';
    },

    cancelarEtapa() {
      document.getElementById('etapa-form').style.display = 'none';
      document.getElementById('nef-pais').value = '';
      document.getElementById('nef-inst').value = '';
    },

    async salvarEtapa() {
      if (!State.pecaAtual) { toast('Salve as informações básicas primeiro.', 'err'); return; }
      const btn = document.querySelector('[onclick="App.salvarEtapa()"]');
      setLoading(btn, true);
      try {
        const payload = {
          etapa:          document.getElementById('nef-etapa').value,
          pais:           document.getElementById('nef-pais').value.trim() || null,
          instalacao_nome: document.getElementById('nef-inst').value.trim() || null,
        };
        await api('POST', `/pecas/${State.pecaAtual.codigo}/etapas-producao`, payload);
        await App.carregarEtapas(State.pecaAtual.codigo);
        App.cancelarEtapa();
        toast('Etapa registrada.');
      } catch(e) {
        toast('Erro ao salvar etapa: ' + e.message, 'err');
      }
      setLoading(btn, false);
    },

    /* ─── DPP ─── */

    atualizarDPPSection() {
      const section = document.getElementById('dpp-section');
      const status  = document.getElementById('f-status').value;
      if (!State.pecaAtual || status === 'ideia') {
        section.classList.remove('visible');
        return;
      }
      section.classList.add('visible');
    },

    async publicarDPP() {
      if (!State.pecaAtual) { toast('Salve a peça primeiro.', 'err'); return; }
      const gtin = document.getElementById('f-gtin').value.trim();
      if (!gtin) { toast('Informe o código GTIN antes de publicar.', 'err'); return; }

      const btn = document.getElementById('btn-publicar-dpp');
      setLoading(btn, true);
      try {
        await api('POST', `/pecas/${State.pecaAtual.codigo}/dpp/publicar`, { gtin });
        toast('Passaporte Digital publicado!');
        State.dppPublicado = true;

        document.getElementById('dpp-published').classList.add('visible');

        // Exibir QR code
        const qrWrap = document.getElementById('dpp-qr');
        qrWrap.innerHTML = `<img src="/dpp/${gtin}/qr" alt="QR Code DPP" onerror="this.alt='QR indisponível'" />`;

        // Link público
        document.getElementById('dpp-link-wrap').innerHTML =
          `Ver passaporte: <a href="/dpp/${gtin}" target="_blank">/dpp/${gtin}</a>`;
      } catch(e) {
        toast('Erro ao publicar DPP: ' + e.message, 'err');
      }
      setLoading(btn, false);
    },

  };

  /* ═══════════════════════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════════════════════ */

  document.addEventListener('DOMContentLoaded', () => {
    App.mostrarTela('list');
    App.carregarLista();

    // Atualiza seção DPP ao mudar status
    document.getElementById('f-status').addEventListener('change', () => {
      App.atualizarDPPSection();
    });
  });
  </script>

</body>
</html>
