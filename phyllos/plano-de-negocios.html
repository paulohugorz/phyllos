<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=business-plan.html">
<title>PHYLLOS — Plano de Negócios</title>
<link rel="canonical" href="business-plan.html">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;family=Jost:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian: #0F0F0D;
    --linen: #E8E4DC;
    --cream: #FAF8F4;
    --gold: #B89A6A;
    --graphite: #3A3A35;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background: var(--cream);
    color: var(--obsidian);
    font-family: var(--sans);
  }
  main {
    max-width: 680px;
    border-top: 1px solid rgba(184,154,106,0.45);
    border-bottom: 1px solid rgba(184,154,106,0.45);
    padding: 42px 0;
  }
  span {
    display: block;
    margin-bottom: 14px;
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  h1 {
    font-family: var(--serif);
    font-size: clamp(42px, 9vw, 76px);
    font-weight: 300;
    line-height: 0.98;
    margin-bottom: 22px;
  }
  p {
    color: var(--graphite);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.8;
    margin-bottom: 28px;
  }
  a {
    color: var(--obsidian);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 6px;
  }
</style>
</head>
<body>
<main>
  <span>Plano consolidado</span>
  <h1>O plano de negócios agora vive em business-plan.html.</h1>
  <p>A estratégia foi atualizada para PHYLLOS Create e Parametric Pattern Engine. Esta URL antiga permanece como ponte para preservar links já publicados.</p>
  <a href="business-plan.html">Abrir plano vivo</a>
</main>
</body>
</html>
