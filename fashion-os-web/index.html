<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --obsidian: #0F0F0D;
      --cream:    #F5F2EB;
      --gold:     #B89A6A;
      --muted:    #9E9B95;
      --border:   rgba(15,15,13,0.12);
      --border-md: rgba(15,15,13,0.22);
    }

    body {
      background: var(--cream);
      color: var(--obsidian);
      font-family: 'Jost', system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .version {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    main {
      display: flex;
      height: calc(100vh - 49px);
    }

    .panel {
      width: 50%;
      display: flex;
      flex-direction: column;
    }
    .panel-left { border-right: 1px solid var(--border); }

    .panel-header {
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      padding: 24px 32px;
      font-family: 'Jost', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--obsidian);
    }
    textarea::placeholder { color: rgba(158,155,149,0.55); }

    .panel-footer {
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .btn {
      padding: 10px 20px;
      font-family: 'Jost', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.18s;
    }
    .btn-primary {
      flex: 1;
      background: var(--obsidian);
      color: var(--cream);
      border: 1px solid var(--obsidian);
    }
    .btn-primary:hover { background: #2a2a26; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(158,155,149,0.5);
    }
    .btn-ghost:hover { border-color: var(--obsidian); color: var(--obsidian); }

    .loading-bar {
      display: none;
      height: 1px;
      width: 40%;
      background: var(--gold);
      animation: sweep 0.9s ease-in-out infinite;
      position: absolute;
      bottom: 0; left: 0;
    }
    .loading-bar.visible { display: block; }
    @keyframes sweep { 0%{left:-40%} 100%{left:100%} }

    /* Right: empty */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0.35;
    }
    .empty-icon {
      width: 52px; height: 52px;
      border: 1px solid var(--border-md);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-label { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }

    /* Right: result */
    .result-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px 32px;
      gap: 20px;
    }
    .result-panel.visible { display: flex; }

    .result-sku {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .img-slot {
      width: 100%;
      min-height: 260px;
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: rgba(232,228,220,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .img-slot span {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }
    .img-slot img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .img-empty {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-slot .img-loading {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(245,242,235,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .img-slot .img-loading.visible { display: flex; }
    .img-spinner {
      width: 20px; height: 20px;
      border: 1.5px solid rgba(15,15,13,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .img-loading-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .meta-table { width: 100%; border-collapse: collapse; }
    .meta-table tr { border-bottom: 1px solid var(--border); }
    .meta-table tr:last-child { border-bottom: none; }
    .meta-table td { padding: 9px 0; font-size: 12px; }
    .meta-table td:first-child { color: var(--muted); }
    .meta-table td:last-child { text-align: right; }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    ::selection { background: rgba(184,154,106,0.15); }

    #fashion-os-references { display: none; flex-direction: column; gap: 8px; }
    #fashion-os-references.visible { display: flex; }
    .refs-label {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .fashion-ref-card {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .fashion-ref-card:last-child { border-bottom: none; }
    .fashion-ref-thumb {
      width: 36px; height: 36px; border-radius: 2px;
      background: rgba(232,228,220,0.6); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); flex-shrink: 0;
    }
    .fashion-ref-card strong { font-size: 11px; font-weight: 400; display: block; }
    .fashion-ref-card p { font-size: 10px; color: var(--muted); margin: 2px 0; }
    .fashion-ref-card small { font-size: 10px; color: var(--muted); opacity: 0.7; }
  </style>
</head>
<body>

  <header>
    <span class="logo">Fashion OS</span>
    <span class="version">v1</span>
  </header>

  <main>

    <section class="panel panel-left">
      <div class="panel-header">
        <span class="panel-label">Descrição da peça</span>
      </div>

      <textarea
        id="description"
        placeholder="Descreva a peça — silhueta, tecido, caimento, cor, referências..."
      ></textarea>

      <div class="panel-footer">
        <button class="btn btn-primary" id="btn-gerar" onclick="gerar()">Gerar peça</button>
        <button class="btn btn-ghost" onclick="limpar()">Limpar</button>
        <div class="loading-bar" id="loading-bar"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <span class="panel-label">Peça formada</span>
      </div>

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M7 3H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1h-3M7 3a2 2 0 0 0 4 0M7 3a2 2 0 0 1 4 0" stroke="#9E9B95" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="empty-label">A peça aparecerá aqui</span>
      </div>

      <div class="result-panel" id="result-panel">
        <span class="result-sku" id="result-sku"></span>

        <div class="img-slot" id="img-slot">
          <img id="generated-img" alt="Peça gerada" />
          <div class="img-loading" id="img-loading">
            <div class="img-spinner"></div>
            <span class="img-loading-label">Gerando</span>
          </div>
          <div class="img-empty" id="img-empty">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="opacity:.35">
              <rect x="3" y="5" width="22" height="18" rx="2" stroke="#9E9B95" stroke-width="1.2"/>
              <circle cx="9.5" cy="11" r="2" stroke="#9E9B95" stroke-width="1.2"/>
              <path d="M3 19l5-5 4 4 4-4 6 6" stroke="#9E9B95" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <table class="meta-table" id="meta-table"></table>

        <div id="fashion-os-references">
          <p class="refs-label">Referências do catálogo</p>
        </div>
      </div>

      <div class="panel-footer">
        <span style="font-size:11px;color:var(--muted);letter-spacing:0.04em;">Powered by Stable Horde — geração gratuita, sem cadastro.</span>
      </div>
    </section>

  </main>

  <script>

    function gerar() {
      const txt = document.getElementById('description').value.trim();
      if (!txt) { document.getElementById('description').focus(); return; }

      const btn = document.getElementById('btn-gerar');
      const bar = document.getElementById('loading-bar');
      btn.disabled = true;
      bar.classList.add('visible');

      setTimeout(() => {
        btn.disabled = false;
        bar.classList.remove('visible');
        mostrarResultado(txt);
      }, 700);
    }

    function mostrarResultado(txt) {
      const ts = Date.now().toString().slice(-4);
      const sku = 'PH' + new Date().getFullYear().toString().slice(-2) + ts;

      const catMatch = txt.match(/calça|saia|blusa|vestido|jaqueta|casaco|camisa|shorts|top|macacão|blazer/i);
      const corMatch = txt.match(/pret[ao]|branc[ao]|cinz[ao]|azul|verde|vermelh[ao]|beg[eê]|crem[ae]|marrom|caramelo|dourad[ao]|off.white/i);
      const tecMatch = txt.match(/linho|seda|algodão|lã|jersey|crepe|tweed|veludo|cetim|tencel|viscose|denim/i);

      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      const cat = catMatch ? cap(catMatch[0]) : '—';
      const cor = corMatch ? cap(corMatch[0]) : '—';
      const tec = tecMatch ? cap(tecMatch[0]) : '—';

      document.getElementById('result-sku').textContent = sku;
      document.getElementById('meta-table').innerHTML = `
        <tr><td>Categoria</td><td>${cat}</td></tr>
        <tr><td>Cor</td><td>${cor}</td></tr>
        <tr><td>Tecido</td><td>${tec}</td></tr>
        <tr><td>Status</td><td><span class="status-badge">Rascunho</span></td></tr>
      `;

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('result-panel').classList.add('visible');
      document.getElementById('fashion-os-references').classList.remove('visible');

      gerarImagem(txt);
    }

    // ── Dados carregados uma vez e cacheados ─────────────────────────────────
    let _fashionTerms = null;
    let _visualRefs   = null;

    async function loadFashionTerms() {
      if (_fashionTerms) return _fashionTerms;
      const r = await fetch('./js/fashion-terms.json', { cache: 'force-cache' });
      _fashionTerms = await r.json();
      return _fashionTerms;
    }

    async function loadVisualRefs() {
      if (_visualRefs) return _visualRefs;
      const r = await fetch('./js/visual-references.json', { cache: 'force-cache' });
      _visualRefs = await r.json();
      return _visualRefs;
    }

    function normalize(s) {
      return String(s || '').toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9\s]/g, ' ').trim();
    }

    // Cruza texto do usuário com termos técnicos — devolve termos que casam
    function matchTerms(txt, terms) {
      const q = normalize(txt);
      return terms.filter(t => {
        const hay = normalize([t.termo_pt, t.termo_en, t.subcategoria, t.definicao, t.atributos_visuais].join(' '));
        return q.split(' ').some(w => w.length > 3 && hay.includes(w));
      });
    }

    // Cruza texto com referências visuais — ordena por contexto e prioridade
    function matchRefs(txt, refs) {
      const q = normalize(txt);
      return refs
        .map(r => {
          const hay = normalize([r.categoria, r.contexto_uso, r.titulo, r.styling_notes, r.pecas_chave, r.prompt_tokens].join(' '));
          const score = q.split(' ').filter(w => w.length > 3 && hay.includes(w)).length + (r.prioridade || 0);
          return { ...r, _score: score };
        })
        .filter(r => r._score > 0)
        .sort((a, b) => b._score - a._score);
    }

    // Monta prompt unificado: taxonomia + referências + base PHYLLOS
    function buildPrompt(txt, matchedTerms, matchedRefs) {
      const posTokens = new Set([
        'fashion editorial photography', 'full body', 'studio lighting',
        'minimalist white background', 'photorealistic', 'high quality',
        'natural pose', 'premium fabric', 'clean finish'
      ]);
      const negTokens = new Set([
        'blurry', 'low quality', 'watermark', 'text', 'disfigured',
        'deformed', 'logo', 'cartoon', 'illustration', 'painting'
      ]);

      matchedTerms.forEach(t => {
        t.prompt_tokens.split(',').map(s => s.trim()).filter(Boolean).forEach(s => posTokens.add(s));
        t.prompt_negativo.split(',').map(s => s.trim()).filter(Boolean).forEach(s => negTokens.add(s));
      });
      matchedRefs.slice(0, 4).forEach(r => {
        r.prompt_tokens.split(',').map(s => s.trim()).filter(Boolean).forEach(s => posTokens.add(s));
        r.prompt_negativo.split(',').map(s => s.trim()).filter(Boolean).forEach(s => negTokens.add(s));
      });

      const pos = txt + ', ' + Array.from(posTokens).join(', ');
      const neg = Array.from(negTokens).join(', ');
      return { pos, neg };
    }

    // Renderiza painel de referências visuais com imagens armazenadas
    function renderRefs(refs) {
      const panel = document.getElementById('fashion-os-references');
      const hasImg = refs.filter(r => r.image_url);
      const noImg  = refs.filter(r => !r.image_url);

      panel.innerHTML = '<p class="refs-label">Referências visuais</p>';

      if (hasImg.length) {
        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;';
        hasImg.slice(0, 3).forEach(r => {
          const div = document.createElement('div');
          div.style.cssText = 'position:relative;aspect-ratio:2/3;overflow:hidden;border-radius:2px;border:1px solid var(--border);';
          div.innerHTML = `
            <img src="${r.image_url}" alt="${r.titulo}"
              style="width:100%;height:100%;object-fit:cover;"
              onerror="this.parentElement.style.display='none'">
            <span style="position:absolute;bottom:0;left:0;right:0;
              padding:4px 6px;font-size:9px;letter-spacing:0.06em;
              text-transform:uppercase;color:var(--muted);
              background:rgba(245,242,235,0.85)">${r.categoria || ''}</span>`;
          grid.appendChild(div);
        });
        panel.appendChild(grid);
      }

      noImg.slice(0, 3).forEach(r => {
        const div = document.createElement('div');
        div.className = 'fashion-ref-card';
        div.innerHTML = `
          <div class="fashion-ref-thumb">${(r.categoria||'ref').slice(0,4)}</div>
          <div>
            <strong>${r.titulo}</strong>
            <p>${r.contexto_uso||''}</p>
            <small>${r.styling_notes||''}</small>
          </div>`;
        panel.appendChild(div);
      });

      panel.classList.toggle('visible', refs.length > 0);
    }

    async function gerarImagem(txt) {
      const img = document.getElementById('generated-img');
      const loading = document.getElementById('img-loading');
      const loadingLabel = loading.querySelector('.img-loading-label');
      const empty = document.getElementById('img-empty');

      img.style.display = 'none';
      empty.style.display = 'none';
      loading.classList.add('visible');
      loadingLabel.textContent = 'Buscando referências';

      // ── 1. Carrega bancos e cruza com o texto ───────────────────────────
      let matchedTerms = [], matchedRefs = [];
      try {
        const [terms, refs] = await Promise.all([loadFashionTerms(), loadVisualRefs()]);
        matchedTerms = matchTerms(txt, terms);
        matchedRefs  = matchRefs(txt, refs);
        renderRefs(matchedRefs);
      } catch (_) {}

      // ── 2. Enriquece com catálogo de imagens externo (fashion-os-catalog) ─
      if (window.FashionOSCatalog) {
        try {
          const catalogRefs = await window.FashionOSCatalog.searchFashionCatalog(txt, { limit: 6 });
          if (catalogRefs.length > 0) {
            const catalogPrompt = window.FashionOSCatalog.buildEnrichedFashionPrompt(txt, catalogRefs);
            txt = catalogPrompt; // usa o prompt enriquecido como base
          }
        } catch (_) {}
      }

      // ── 3. Compila prompt final ──────────────────────────────────────────
      const { pos, neg } = buildPrompt(txt, matchedTerms, matchedRefs);

      loadingLabel.textContent = 'Gerando';

      try {
        const submitRes = await fetch('https://stablehorde.net/api/v2/generate/async', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': '0000000000' },
          body: JSON.stringify({
            prompt: pos + ' ### ' + neg,
            params: {
              sampler_name: 'k_euler_a',
              cfg_scale: 7.5,
              steps: 30,
              width: 512,
              height: 768,
              n: 1,
              karras: true
            },
            r2: false,
            slow_workers: true,
            models: ['AlbedoBase XL (SDXL)']
          })
        });

        if (!submitRes.ok) { showImgError('Erro ao enviar geração'); return; }
        const { id } = await submitRes.json();

        let attempts = 0;
        while (attempts < 60) {
          await new Promise(r => setTimeout(r, 3000));
          attempts++;
          const checkRes = await fetch(`https://stablehorde.net/api/v2/generate/check/${id}`);
          const check = await checkRes.json();
          if (check.faulted) { showImgError('Falha na geração — tente novamente'); return; }
          if (check.wait_time > 0) loadingLabel.textContent = `~${check.wait_time}s`;
          if (check.done) {
            const statusRes = await fetch(`https://stablehorde.net/api/v2/generate/status/${id}`);
            const status = await statusRes.json();
            const b64 = status?.generations?.[0]?.img;
            if (!b64) { showImgError('Imagem não retornada'); return; }
            img.src = 'data:image/webp;base64,' + b64;
            img.style.display = 'block';
            loading.classList.remove('visible');
            return;
          }
        }
        showImgError('Tempo esgotado — tente novamente');
      } catch (e) {
        showImgError('Sem conexão com a API');
      }
    }

    function showImgError(msg) {
      document.getElementById('img-loading').classList.remove('visible');
      const empty = document.getElementById('img-empty');
      empty.innerHTML = `
        <div style="text-align:center;padding:16px;display:flex;flex-direction:column;gap:8px;align-items:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="opacity:.3">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="#9E9B95" stroke-width="1.2"/>
            <path d="M12 10v4M12 16h.01" stroke="#9E9B95" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)">${msg}</span>
        </div>`;
      empty.style.display = 'flex';
    }

    function limpar() {
      document.getElementById('description').value = '';
      document.getElementById('result-panel').classList.remove('visible');
      document.getElementById('empty-state').style.display = '';
      document.getElementById('fashion-os-references').classList.remove('visible');
      const img = document.getElementById('generated-img');
      img.style.display = 'none';
      img.src = '';
      document.getElementById('img-empty').style.display = 'flex';
      document.getElementById('img-loading').classList.remove('visible');
    }
  </script>

  <script src="./js/fashion-os-catalog.js"></script>
</body>
</html>
